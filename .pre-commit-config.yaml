---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: detect-private-key

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: \.(yaml|yml)$
        name: yamllint
        description: Run yamllint
        verbose: false

  - repo: local
    hooks:
      - id: ansible-lint
        name: ansible lint
        description: Run ansible-lint from the devbox-managed environment (avoids Nix/pre-commit venv collisions)
        entry: ansible-lint
        language: system
        files: \.(yaml|yml)$
        pass_filenames: false
        verbose: false
