---
name: test role
on:
  workflow_call:
    inputs:
      role_name:
        required: true
        type: string
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.15.0
      - name: Prepare env
        run: devbox run -- task prepare
      - name: Run molecule test
        run: |
          attempts=3
          for i in $(seq 1 "$attempts"); do
            echo "::group::Molecule test attempt $i/$attempts (${{ inputs.role_name }})"
            if devbox run -- task test:role:${{ inputs.role_name }}; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Attempt $i/$attempts failed for role ${{ inputs.role_name }}"
            sleep 20
          done
          echo "::error::Molecule test failed after $attempts attempts for role ${{ inputs.role_name }}"
          exit 1
