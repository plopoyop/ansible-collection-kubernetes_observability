---
# defaults file for jaeger
# @var jaeger_enabled
# @var jaeger_enabled:type: boolean
# @var jaeger_enabled:description: >
# Install Jaeger chart
jaeger_enabled: true

# @var jaeger_namespace
# @var jaeger_namespace:type: string
# @var jaeger_namespace:description: >
# K8s namespace to install Jaeger chart
jaeger_namespace: "jaeger"

# @var jaeger_chart_version
# @var jaeger_chart_version:type: string
# @var jaeger_chart_version:description: >
# Jaeger chart version
jaeger_chart_version: 4.11.1

# @var jaeger_deployment_name
# @var jaeger_deployment_name:type: string
# @var jaeger_deployment_name:description: >
# Jaeger helm release name
jaeger_deployment_name: "jaeger"

# @var jaeger_replicas
# @var jaeger_replicas:type: int
# @var jaeger_replicas:description: >
# Number of pod replicas for Jaeger
jaeger_replicas: 1

# @var jaeger_image_tag
# @var jaeger_image_tag:type: string
# @var jaeger_image_tag:description: >
# Override the Jaeger container image tag (leave empty to use the chart default)
jaeger_image_tag: ""

# @var jaeger_resources
# @var jaeger_resources:type: dict
# @var jaeger_resources:description: >
# Resource requests/limits for the Jaeger Deployment
# @var jaeger_resources:example: >
# jaeger_resources:
#   limits:
#     cpu: 500m
#     memory: 512Mi
#   requests:
#     cpu: 100m
#     memory: 256Mi
jaeger_resources: {}

# @var jaeger_extra_env
# @var jaeger_extra_env:type: list
# @var jaeger_extra_env:description: >
# Additional environment variables passed to the Jaeger container
# @var jaeger_extra_env:example: >
# jaeger_extra_env:
#   - name: "LOG_LEVEL"
#     value: "debug"
jaeger_extra_env: []

# @var jaeger_uiconfig
# @var jaeger_uiconfig:type: dict
# @var jaeger_uiconfig:description: >
# Jaeger UI configuration JSON (rendered as a ConfigMap, mounted at
# `/etc/jaeger/ui-config.json`). See https://www.jaegertracing.io/docs/latest/deployment/frontend-ui/
jaeger_uiconfig: {}

# @var jaeger_userconfig
# @var jaeger_userconfig:type: dict
# @var jaeger_userconfig:description: >
# Jaeger 2.x config YAML (rendered as a ConfigMap, passed to the binary
# via `--config /etc/jaeger/user-config.yaml`). This is the ONLY hook to
# configure storage backend (badger / ES / Cassandra), receivers, exporters,
# extensions and sampling on Jaeger 2.x.
# @var jaeger_userconfig:example: >
# jaeger_userconfig:
#   service:
#     extensions: [jaeger_storage, jaeger_query]
#     pipelines:
#       traces:
#         receivers: [otlp]
#         exporters: [jaeger_storage_exporter]
#   extensions:
#     jaeger_storage:
#       backends:
#         some_storage:
#           badger:
#             directories:
#               keys: "/tmp/jaeger/keys"
#               values: "/tmp/jaeger/values"
#             ephemeral: true
jaeger_userconfig: {}

# @var jaeger_ingress_enabled
# @var jaeger_ingress_enabled:type: boolean
# @var jaeger_ingress_enabled:description: >
# Enable ingress for the Jaeger UI
jaeger_ingress_enabled: false

# @var jaeger_ingress_class_name
# @var jaeger_ingress_class_name:type: string
# @var jaeger_ingress_class_name:description: >
# Ingress class name for Jaeger
jaeger_ingress_class_name: ""

# @var jaeger_ingress_hostname
# @var jaeger_ingress_hostname:type: string
# @var jaeger_ingress_hostname:description: >
# Hostname for the Jaeger ingress
jaeger_ingress_hostname: ""

# @var jaeger_ingress_tls_enabled
# @var jaeger_ingress_tls_enabled:type: boolean
# @var jaeger_ingress_tls_enabled:description: >
# Enable TLS for the Jaeger ingress
jaeger_ingress_tls_enabled: false

# @var jaeger_ingress_tls_secret_name
# @var jaeger_ingress_tls_secret_name:type: string
# @var jaeger_ingress_tls_secret_name:description: >
# Secret name for the Jaeger TLS certificate
jaeger_ingress_tls_secret_name: ""

# @var jaeger_ingress_annotations
# @var jaeger_ingress_annotations:type: dict
# @var jaeger_ingress_annotations:description: >
# Annotations applied to the Jaeger ingress
# @var jaeger_ingress_annotations:example: >
# jaeger_ingress_annotations:
#   kubernetes.io/ingress.class: "{{ jaeger_ingress_class_name }}"
#   cert-manager.io/cluster-issuer: "letsencrypt-prod"
jaeger_ingress_annotations: {}

# @var jaeger_ingress_labels
# @var jaeger_ingress_labels:type: dict
# @var jaeger_ingress_labels:description: >
# Labels applied to the Jaeger ingress
# @var jaeger_ingress_labels:example: >
# jaeger_ingress_labels:
#   app: jaeger
jaeger_ingress_labels: {}

# ------------------------------------------------------------------------------
# Persistence (badger) — lightweight persistent storage, alternative to
# Elasticsearch/OpenSearch for low trace volumes. When enabled, a PVC is created
# and mounted into the Jaeger pod; pair it with `jaeger_userconfig` (badger
# backend, `ephemeral: false`, `directories` under `jaeger_persistence_mount_path`).
# Keep `jaeger_replicas: 1` (badger is a single-writer embedded store).
# ------------------------------------------------------------------------------

# @var jaeger_persistence_enabled
# @var jaeger_persistence_enabled:type: boolean
# @var jaeger_persistence_enabled:description: >
# Create and mount a PersistentVolumeClaim so the embedded badger storage
# survives pod restarts. Keep jaeger_replicas at 1 (badger is single-writer).
jaeger_persistence_enabled: false

# @var jaeger_persistence_name
# @var jaeger_persistence_name:type: string
# @var jaeger_persistence_name:description: >
# Name of the PersistentVolumeClaim created when jaeger_persistence_enabled.
jaeger_persistence_name: "{{ jaeger_deployment_name }}-data"

# @var jaeger_persistence_size
# @var jaeger_persistence_size:type: string
# @var jaeger_persistence_size:description: >
# Requested size of the badger PersistentVolumeClaim.
jaeger_persistence_size: "10Gi"

# @var jaeger_persistence_access_modes
# @var jaeger_persistence_access_modes:type: list
# @var jaeger_persistence_access_modes:description: >
# Access modes of the badger PersistentVolumeClaim.
jaeger_persistence_access_modes:
  - "ReadWriteOnce"

# @var jaeger_persistence_storage_class
# @var jaeger_persistence_storage_class:type: string
# @var jaeger_persistence_storage_class:description: >
# StorageClass for the badger PVC (empty = cluster default StorageClass).
jaeger_persistence_storage_class: ""

# @var jaeger_persistence_mount_path
# @var jaeger_persistence_mount_path:type: string
# @var jaeger_persistence_mount_path:description: >
# Mount path of the badger volume inside the Jaeger container. Point the badger
# `directories` (keys/values) in jaeger_userconfig under this path.
jaeger_persistence_mount_path: "/badger"

# @var jaeger_persistence_volume_name
# @var jaeger_persistence_volume_name:type: string
# @var jaeger_persistence_volume_name:description: >
# Name of the pod volume/volumeMount used for the badger PVC.
jaeger_persistence_volume_name: "jaeger-data"

# @var jaeger_extra_volumes
# @var jaeger_extra_volumes:type: list
# @var jaeger_extra_volumes:description: >
# Extra volumes added to the Jaeger pod (rendered as jaeger.extraVolumes), in
# addition to the managed persistence volume.
jaeger_extra_volumes: []

# @var jaeger_extra_volume_mounts
# @var jaeger_extra_volume_mounts:type: list
# @var jaeger_extra_volume_mounts:description: >
# Extra volume mounts for the Jaeger container (rendered as
# jaeger.extraVolumeMounts), in addition to the managed persistence mount.
jaeger_extra_volume_mounts: []
