---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'grafana' namespace to be removed."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "grafana"
      register: namespace_grafana
      until: namespace_grafana.resources | length == 0
      retries: 30
      delay: 5

    - name: "Assert that 'grafana' namespace is removed."
      ansible.builtin.assert:
        that: namespace_grafana.resources | length == 0
        fail_msg: "Namespace 'grafana' is still present."

    - name: "Wait for 'grafana' deployment to be removed."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "grafana"
        namespace: "grafana"
      register: grafana_deployment
      until: grafana_deployment.resources | length == 0
      retries: 30
      delay: 5

    - name: "Assert that 'grafana' deployment is removed."
      ansible.builtin.assert:
        that: grafana_deployment.resources | length == 0
        fail_msg: "Deployment 'grafana' is still present."
