---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "victorialogs"
        - "install"
  when: victorialogs_enabled
  tags:
    - "victorialogs"
    - "install"

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "victorialogs"
        - "uninstall"
  when: not victorialogs_enabled
  tags:
    - "victorialogs"
    - "uninstall"
