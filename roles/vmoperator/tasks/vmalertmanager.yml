---
- name: "Pre-check: VMAlertmanager CRD installed"
  kubernetes.core.k8s_info:
    api_version: "apiextensions.k8s.io/v1"
    kind: "CustomResourceDefinition"
    name: "vmalertmanagers.operator.victoriametrics.com"
  register: vmoperator_vmalertmanager_crd
  check_mode: false
  failed_when: not ansible_check_mode and (vmoperator_vmalertmanager_crd.resources | length == 0)
  tags:
    - "preflight"

- name: "Create namespace for VMAlertmanager CR"
  kubernetes.core.k8s:
    name: "{{ vmoperator_vmalertmanager_namespace }}"
    api_version: "v1"
    kind: "Namespace"
    state: "present"
  tags:
    - "namespace"

- name: "Apply VMAlertmanager CR"
  kubernetes.core.k8s:
    state: "present"
    apply: true
    definition: >-
      {{ lookup('ansible.builtin.template', 'vmalertmanager_cr.yml.j2') | ansible.builtin.from_yaml }}
  when: vmoperator_vmalertmanager_crd.resources | length > 0
  tags:
    - "custom_resource"
