---
- name: "Create VictoriaMetrics Operator namespace"
  kubernetes.core.k8s:
    name: "{{ vmoperator_namespace }}"
    api_version: "v1"
    kind: "Namespace"
    state: "present"
  tags:
    - "namespace"

- name: "Add VictoriaMetrics helm repo"
  kubernetes.core.helm_repository:
    name: "{{ vmoperator_helm_repo_name }}"
    repo_url: "{{ vmoperator_helm_repo_url }}"
  tags:
    - "helm_repository"

- name: "Install VictoriaMetrics Operator chart"
  kubernetes.core.helm:
    name: "{{ vmoperator_deployment_name }}"
    chart_ref: "{{ vmoperator_chart_ref }}"
    namespace: "{{ vmoperator_namespace }}"
    chart_version: "{{ vmoperator_chart_version }}"
    state: "present"
    wait: true
    wait_timeout: "5m"
    values: >-
      {{
        (lookup('ansible.builtin.template', 'vm_operator_helm_values.yml.j2') | ansible.builtin.from_yaml)
        | ansible.builtin.combine(vmoperator_extra_values, recursive=True)
      }}
  tags:
    - "helm_chart"

# Helm `wait` ne couvre pas l'enregistrement des CRDs (parfois posées en
# hook post-install). On vérifie explicitement avant de laisser la main
# aux tâches qui apply les CRs.
# En check mode, l'install n'a pas tourné → on ne tente pas le wait.
- name: "Wait for VictoriaMetrics Operator CRDs to be registered"
  kubernetes.core.k8s_info:
    api_version: "apiextensions.k8s.io/v1"
    kind: "CustomResourceDefinition"
    name: "{{ item }}"
  register: vmoperator_crd_check
  retries: 30
  delay: 2
  until: vmoperator_crd_check.resources | length > 0
  # Cœur des CRD posées par le chart : on attend l'ensemble (et pas seulement
  # celles consommées par ce rôle) comme signal que l'enregistrement est
  # terminé avant de laisser la main aux tâches qui apply les CR.
  loop:
    - "vmagents.operator.victoriametrics.com"
    - "vmalerts.operator.victoriametrics.com"
    - "vmalertmanagers.operator.victoriametrics.com"
    - "vmauths.operator.victoriametrics.com"
    - "vmusers.operator.victoriametrics.com"
    - "vmrules.operator.victoriametrics.com"
  loop_control:
    label: "{{ item }}"
  when: not ansible_check_mode
  tags:
    - "preflight"
