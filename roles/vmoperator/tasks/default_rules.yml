---
- name: "Pre-check: VMRule CRD installed (default_rules requires the operator)"
  kubernetes.core.k8s_info:
    api_version: "apiextensions.k8s.io/v1"
    kind: "CustomResourceDefinition"
    name: "vmrules.operator.victoriametrics.com"
  register: vmoperator_vmrule_crd
  check_mode: false
  failed_when: not ansible_check_mode and (vmoperator_vmrule_crd.resources | length == 0)
  tags:
    - "preflight"

- name: "Create namespace for default rules"
  kubernetes.core.k8s:
    name: "{{ vmoperator_default_rules_namespace }}"
    api_version: "v1"
    kind: "Namespace"
    state: "present"
  tags:
    - "namespace"

- name: "Add VictoriaMetrics helm repo"
  kubernetes.core.helm_repository:
    name: "{{ vmoperator_helm_repo_name }}"
    repo_url: "{{ vmoperator_helm_repo_url }}"
  tags:
    - "helm_repository"

# Skip the helm install when the VMRule CRD isn't there (operator not yet
# installed, typically in check mode) — the chart would otherwise fail
# validation on the unknown VMRule kind.
- name: "Install victoria-metrics-k8s-stack chart in rules-only mode"
  kubernetes.core.helm:
    name: "{{ vmoperator_default_rules_deployment_name }}"
    chart_ref: "{{ vmoperator_default_rules_chart_ref }}"
    namespace: "{{ vmoperator_default_rules_namespace }}"
    chart_version: "{{ vmoperator_default_rules_chart_version }}"
    state: "present"
    values: >-
      {{
        (lookup('ansible.builtin.template', 'default_rules_helm_values.yml.j2') | ansible.builtin.from_yaml)
        | ansible.builtin.combine(vmoperator_default_rules_extra_values, recursive=True)
      }}
  when: vmoperator_vmrule_crd.resources | length > 0
  tags:
    - "helm_chart"
