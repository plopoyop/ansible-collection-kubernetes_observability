---
- name: "Assert: VMAlert datasource URL is set"
  ansible.builtin.assert:
    that:
      - vmoperator_vmalert_datasource_url | length > 0
    fail_msg: >-
      vmoperator_vmalert_datasource_url must be set when
      vmoperator_vmalert_enabled is true: the VMAlert CR needs a
      VictoriaMetrics datasource to evaluate its rules against.
  tags:
    - "preflight"

- name: "Pre-check: VMAlert CRD installed"
  kubernetes.core.k8s_info:
    api_version: "apiextensions.k8s.io/v1"
    kind: "CustomResourceDefinition"
    name: "vmalerts.operator.victoriametrics.com"
  register: vmoperator_vmalert_crd
  check_mode: false
  failed_when: not ansible_check_mode and (vmoperator_vmalert_crd.resources | length == 0)
  tags:
    - "preflight"

- name: "Create namespace for VMAlert CR"
  kubernetes.core.k8s:
    name: "{{ vmoperator_vmalert_namespace }}"
    api_version: "v1"
    kind: "Namespace"
    state: "present"
  tags:
    - "namespace"

# CRD absente en check mode signifie : l'opérateur n'est pas installé sur ce
# cluster (state actuel) — on ne tente pas l'apply pour éviter une erreur
# de validation côté kube-apiserver.
- name: "Apply VMAlert CR"
  kubernetes.core.k8s:
    state: "present"
    apply: true
    definition: >-
      {{ lookup('ansible.builtin.template', 'vmalert_cr.yml.j2') | ansible.builtin.from_yaml }}
  when: vmoperator_vmalert_crd.resources | length > 0
  tags:
    - "custom_resource"
